name: Publish filtered calendars

on:
  schedule:
    # Twice daily (UTC). GitHub cron is best-effort; the <=12h freshness target has margin.
    - cron: '0 6 * * *'
    - cron: '0 18 * * *'
  workflow_dispatch:
    inputs:
      implementation:
        description: 'Which implementation to run'
        type: choice
        options: [python, dotnet]
        default: python
  push:
    branches: [main]
    paths:
      - 'allowlists/**'

permissions:
  contents: write      # commit the refreshed public/ back
  pages: write
  id-token: write

# Allow only one publish at a time; do not cancel an in-progress deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      IMPL: ${{ github.event.inputs.implementation || 'python' }}
      SOURCE_ICS_URL: ${{ secrets.SOURCE_ICS_URL }}
    steps:
      - uses: actions/checkout@v4   # brings in the committed public/ = last-good for every feed

      - name: Log run start
        run: echo "Run started $(date -u +'%Y-%m-%dT%H:%M:%SZ') UTC — implementation=$IMPL"

      # --- Python implementation ---
      - name: Set up Python
        if: env.IMPL == 'python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python dependencies
        if: env.IMPL == 'python'
        run: pip install icalendar httpx
      - name: Filter (Python)
        if: env.IMPL == 'python'
        env:
          PYTHONPATH: src/python
        run: |
          set -o pipefail
          python -m filter_ics --allowlists-dir allowlists --output-dir public --verbose | tee run.log

      # --- .NET implementation ---
      - name: Set up .NET
        if: env.IMPL == 'dotnet'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
      - name: Filter (.NET)
        if: env.IMPL == 'dotnet'
        run: |
          set -o pipefail
          dotnet run --project src/dotnet/FilterIcs/FilterIcs.csproj -c Release -- --allowlists-dir allowlists --output-dir public --verbose | tee run.log

      # Surface partial failures without blocking the good feeds.
      - name: Flag skipped feeds
        run: |
          if grep -q 'skipped=[1-9]' run.log; then
            echo "::warning::One or more feeds were skipped — see the run log for details."
          fi

      # Persist the refreshed feeds so each feed's last-good survives across runs.
      - name: Commit refreshed feeds
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public
          if git diff --cached --quiet; then
            echo "no feed changes to commit"
          else
            git commit -m "chore: refresh published feeds [skip ci]"
            git push
          fi

      # Only reached if the filter step above succeeded — a failure there means the previous
      # Pages deployment (and committed public/) is left untouched (per-feed last-good preserved).
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
